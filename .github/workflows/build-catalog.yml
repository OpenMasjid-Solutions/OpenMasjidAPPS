name: Build catalog

# Regenerate catalog.json (the file OpenMasjidOS fetches) from registry.yaml.
# The build script fetches each listed app repo's manifest + compose + assets and
# assembles the catalog, so we rebuild when the registry/tooling changes, on a
# daily schedule (to pick up apps whose entry tracks a branch), on manual run, and
# when an app repo signals a new release via repository_dispatch.

on:
  push:
    branches: [main]
    paths:
      - 'registry.yaml'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/build-catalog.yml'
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [rebuild-catalog]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Check out with a push token that can update the CLA-protected `main`. `main`
      # requires the `cla` status check, which the default github-actions[bot] token
      # can't satisfy on a direct push — so the auto-commit below was being rejected
      # ("Required status check cla is expected"). Provide a CATALOG_PUSH_TOKEN secret
      # (a PAT / GitHub App token from an account allowed to bypass branch protection,
      # scoped to Contents: write on this repo); checkout persists it so the later
      # `git push` uses it. Falls back to the default token when the secret is unset
      # (the push then fails loudly, as before, and the catalog is published manually).
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CATALOG_PUSH_TOKEN || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm run build

      # This step auto-commits and pushes catalog.json with no human review (cron +
      # repository_dispatch run unattended). That makes the registry pins the only
      # integrity control: an entry pinned to a mutable tag/branch can be moved to
      # backdoored content and republished here within ~24h. Pin each entry to an
      # immutable 40-char commit SHA (registry.yaml "commit:"), and require apps to
      # digest-pin their images (@sha256:…). The build prints ⚠ warnings for any
      # mutable ref or non-digest image; treat those as review signals.
      - name: Commit regenerated catalog.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          if git diff --staged --quiet; then
            echo "catalog.json already up to date."
          else
            git commit -m "chore: rebuild catalog.json"
            git push
          fi
