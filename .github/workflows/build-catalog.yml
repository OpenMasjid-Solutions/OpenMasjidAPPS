name: Build catalog

# Regenerate catalog.json (the file OpenMasjidOS fetches) from registry.yaml.
# The build script fetches each listed app repo's manifest + compose + assets and
# assembles the catalog, so we rebuild when the registry/tooling changes, on a
# daily schedule (to pick up apps whose entry tracks a branch), on manual run, and
# when an app repo signals a new release via repository_dispatch.

on:
  push:
    branches: [main]
    paths:
      - 'registry.yaml'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/build-catalog.yml'
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [rebuild-catalog]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm run build

      - name: Commit regenerated catalog.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          if git diff --staged --quiet; then
            echo "catalog.json already up to date."
          else
            git commit -m "chore: rebuild catalog.json"
            git push
          fi
