# OpenMasjidAPPS registry
# ---------------------------------------------------------------------------
# This is the ONLY hand-edited source of truth for the catalog. Each app lives
# in its OWN public repository; this file just lists them. The build script
# (scripts/build-catalog.mjs) fetches each repo's manifest.yaml +
# docker-compose.yml (+ icon/screenshots) and assembles catalog.json — the file
# OpenMasjidOS actually fetches.
#
# To list an app, open a PR adding an entry below. Each entry:
#
#   - id:     <app-id>               # kebab-case, must equal the app's manifest id
#     repo:   <owner>/<repo>         # the app's own GitHub repository
#     commit: <40-char SHA>          # RECOMMENDED — an immutable commit SHA pin
#     ref:    v1.0.0                 # a git TAG or branch (MUTABLE — can be moved)
#     path:   subdir                 # OPTIONAL — if manifest.yaml isn't at the repo root
#
# Pin to a `commit:` (a full 40-char hex commit SHA) for security. Tags and
# branches are MUTABLE — a compromised or turned-malicious app-repo owner can move
# the ref to backdoored content, and the unattended daily rebuild republishes it to
# the catalog.json every install fetches. A commit SHA cannot be moved, so it is the
# only immutable pin. `commit:` (or an equivalent `sha:`) takes precedence over
# `ref:`; a `ref:` that is itself a 40-char SHA is also treated as immutable. If you
# only set a mutable `ref:`, the build prints a ⚠ warning naming the entry (and, when
# the GitHub API is reachable, the SHA it currently resolves to — copy it here).
#
# Requirements an app repo must meet are in CLAUDE.md and docs/BUILDING_AN_APP.md.
# Complete, working reference apps live under examples/ in this repo — copy one
# into a new repo to start.
# ---------------------------------------------------------------------------

apps:
  - id: display
    repo: OpenMasjid-Solutions/OpenMasjidDisplay
    ref: v0.58.0                                 # release line; commit (below) is the immutable pin (v0.58.0: admin chrome standardized to the sibling apps — dark scene in both themes, filled-glass avatar, luminance-aware on-scene text)
    commit: 72d041083cdcea02cc3dc19d4725b1612b06c8e8
  - id: donations
    repo: OpenMasjid-Solutions/OpenMasjidDonations
    ref: v0.25.0                                 # embeddable per-campaign donation widget (/w/<slug>, copy-paste iframe); commit below is the immutable pin (adds the @sha256 image digest)
    commit: 26b9b6325139763e5af525b9c53e9c3dd2763aef
  - id: kiosk
    repo: OpenMasjid-Solutions/OpenMasjidKiosk
    ref: v0.9.13                                 # v0.9.13 - portrait-friendly giving screen; set each kiosk's screen orientation from the web (Admin → Devices); choose which kiosks a campaign shows on; one-tap colour theme presets. Bumped per release.
    commit: 07d4842f5f22a0d6c40c335625de97ff02e8ad40   # immutable pin; the app's compose pins the @sha256 image digest
  - id: students
    repo: OpenMasjid-Solutions/OpenMasjidStudentManager
    ref: main                                    # v0.6.0 — weekly timetable (by class/teacher/student, soft conflict warnings) + teacher app (My week / My classes, server-side scoping). One-click install; commit below is the immutable pin, and the app's compose pins the @sha256 image digest
    commit: b6aa985d45aa96755e75e312ad8df295a3341dee
  # Example (uncomment and adapt once the app repo exists):
  # - id: prayer-times-display
  #   repo: OpenMasjid-Solutions/openmasjid-prayer-times-display
  #   ref: v1.0.0
  # - id: announcements-board
  #   repo: OpenMasjid-Solutions/openmasjid-announcements-board
  #   ref: v1.0.0

# Coming-soon teasers — apps that aren't released yet (no repo/image). They show
# in the App Store with a "Coming soon" badge and can't be installed. Metadata
# only here; when one ships, give it a repo + tag and move it up into `apps:`.
coming_soon: []
